<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ретуза</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="google-site-verification" content="GX7jW_CempUcIx2KK9ux8jZqWp3X9R5dVxJWZAHw4XM" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body {
background-color: #000000;
margin: 0;
padding: 0;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
overflow: hidden;
font-family: 'Press Start 2P', monospace;
}
.wrapper {
display: flex;
flex-direction: column;
align-items: center;
text-align: center;
padding: 20px;
}
.art-image {
max-width: 300px;
width: 80%;
height: auto;
margin-bottom: 30px;
animation: fadeIn 3s ease-in-out forwards;
}
.text {
color: #555555;
font-size: 10px;
letter-spacing: 2px;
text-transform: lowercase;
text-decoration: none;
transition: color 0.5s ease;
}
.text:hover {
color: #ffffff;
text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
}
@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}
@media (max-width: 480px) {
.art-image { max-width: 200px; }
.text { font-size: 8px; }
}
</style>
</head>
<body>
<div class="wrapper">
<img src="eye.jpg" alt="eye" class="art-image">
<div class="text">coming soon...</div>
</div>
</body>
</html>
